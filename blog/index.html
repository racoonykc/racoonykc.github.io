<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Blog | Kaicheng Yang</title><link rel="stylesheet" href="../css/style.css"><style>html,body{height:auto;min-height:100%;overflow:auto}body{background:linear-gradient(135deg,#101513,#293834 52%,#2f241d);color:#f6f1e8}main.subpage{height:auto;min-height:100vh;overflow:visible;position:relative;width:min(1000px,92vw);margin:0 auto;padding:8vh 0 10vh}.subpage a{color:#f6f1e8}.lang-toggle{position:fixed;top:22px;right:22px;z-index:1000;width:44px;height:36px;border:1px solid rgba(246,241,232,.42);border-radius:999px;background:rgba(16,21,19,.42);color:#f6f1e8;font-size:14px;font-weight:700;backdrop-filter:blur(12px);cursor:pointer}.back{display:inline-flex;margin-bottom:34px;border:1px solid rgba(246,241,232,.35);border-radius:6px;padding:10px 14px;font-size:14px}h1{margin:0 0 18px;font-size:44px;font-weight:500}.lead{max-width:820px;color:rgba(246,241,232,.78);line-height:1.8}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:34px}.card,.paper{border:1px solid rgba(246,241,232,.18);border-radius:8px;background:rgba(16,21,19,.42);padding:22px;backdrop-filter:blur(18px)}.card h2,.paper h2{margin:8px 0 10px;font-size:20px;line-height:1.42}.card p,.paper p{margin:0;color:rgba(246,241,232,.74);line-height:1.68}.meta{color:#e0b198;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}.links{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.links a,.inline-link{border:1px solid rgba(246,241,232,.3);border-radius:6px;padding:7px 10px;font-size:13px}.paper{margin-top:14px}.section-title{margin:36px 0 12px;color:#e0b198;font-size:15px;letter-spacing:.08em;text-transform:uppercase}.placeholder{opacity:.7}@media(max-width:760px){.grid{grid-template-columns:1fr}h1{font-size:34px}.lang-toggle{top:14px;right:14px}}.panel{border:1px solid rgba(246,241,232,.18);border-radius:8px;background:rgba(16,21,19,.42);padding:30px;backdrop-filter:blur(18px)}</style></head><body><button class="lang-toggle" type="button" data-lang-toggle aria-label="Switch language">中</button><main class="subpage"><a class="back" href="../#hub" data-en="Back Home" data-zh="返回主页">Back Home</a><section class="panel"><h1 data-en="Blog" data-zh="博客">Blog</h1><p class="lead" data-en="This space is reserved for notes on efficient ML, AI4Human, research taste, and the occasional personal essay." data-zh="这里预留给 Efficient ML、AI4Human、科研品味以及偶尔的个人随笔。">This space is reserved for notes on efficient ML, AI4Human, research taste, and the occasional personal essay.</p></section></main><script>function applyLanguage(lang){document.documentElement.lang=lang==='zh'?'zh-CN':'en';document.querySelectorAll('[data-en][data-zh]').forEach(function(el){el.textContent=el.getAttribute(lang==='zh'?'data-zh':'data-en')});document.querySelectorAll('[data-lang-toggle]').forEach(function(el){el.textContent=lang==='zh'?'EN':'中';el.setAttribute('aria-label',lang==='zh'?'Switch to English':'切换到中文')});localStorage.setItem('site-lang',lang)}document.addEventListener('DOMContentLoaded',function(){var saved=localStorage.getItem('site-lang')||'en';applyLanguage(saved);document.querySelectorAll('[data-lang-toggle]').forEach(function(el){el.addEventListener('click',function(){applyLanguage((localStorage.getItem('site-lang')||'en')==='zh'?'en':'zh')})})});</script></body></html>
